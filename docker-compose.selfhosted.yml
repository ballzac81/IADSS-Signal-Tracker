# IADSS Signal Tracker — Self-hosted (Unraid / home server)
# Uses Cloudflare Tunnel for external access — no open ports on your router.
#
# Prerequisites:
#   1. Fill in your values in .env
#   2. Run: docker compose -f docker-compose.selfhosted.yml up -d
#
# Unraid auto-start on boot — add to /boot/config/go:
#   cd /mnt/user/appdata/IADSS-Signal-Tracker && docker compose -f docker-compose.selfhosted.yml up -d
#
# ── Cloudflare Tunnel ────────────────────────────────────────────────────────
#
# OPTION A — You already have a Cloudflare Tunnel container running on Unraid
#   (e.g. the figro/unraid-cloudflared-tunnel Community App)
#   1. Set DOCKER_NETWORK in .env to your tunnel container's Docker network name
#   2. In Cloudflare Zero Trust → Tunnels → your tunnel → Public Hostnames:
#        signals.yourdomain.com  →  http://YOUR_SERVER_IP:5000
#        trade.yourdomain.com    →  http://YOUR_SERVER_IP:8067
#
# OPTION B — You don't have cloudflared running yet
#   1. Go to Cloudflare Zero Trust → Networks → Tunnels → Create tunnel
#   2. Copy the token and add it to .env as CLOUDFLARE_TUNNEL_TOKEN
#   3. Uncomment the cloudflared service at the bottom of this file
#   4. Remove the networks: key from each service block and delete the
#      top-level networks: block entirely
#   5. In Cloudflare public hostnames point to:
#        signals.yourdomain.com  →  http://signal-tracker:5000
#        trade.yourdomain.com    →  http://freqtrade:8080

services:
  # ── Freqtrade ───────────────────────────────────────────────────────────────
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    container_name: freqtrade
    restart: unless-stopped
    ports:
      - "8067:8080"
    networks:
      - tunnel_network
    volumes:
      - ./user_data:/freqtrade/user_data
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --config /freqtrade/user_data/config.json
      --strategy WebhookStrategy

  # ── Signal Tracker ──────────────────────────────────────────────────────────
  signal-tracker:
    build: .
    container_name: signal-tracker
    restart: unless-stopped
    ports:
      - "5000:5000"
    networks:
      - tunnel_network
    environment:
      - SECRET_TOKEN=${SECRET_TOKEN}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - FREQTRADE_API=http://freqtrade:8080/api/v1
      - FREQTRADE_USER=admin
      - FREQTRADE_PASS=${FREQTRADE_PASS}
      - STAKE_RATIO=${STAKE_RATIO:-0.5}
      - SELL_RATIO=${SELL_RATIO:-0.5}
      - MIN_STAKE=${MIN_STAKE:-10}
    depends_on:
      - freqtrade
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Cloudflare Tunnel (OPTION B only) ───────────────────────────────────────
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: IADSS_cloudflared
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     - signal-tracker
  #     - freqtrade

networks:
  tunnel_network:
    name: ${DOCKER_NETWORK}
    external: true
